<!DOCTYPE html>
<html>
<head>
<style>
  div {
    color: white;
    padding: 10px;
    margin: 5px;
  }

  .block-demo {
    display: block;
    background-color: red;
    width: 150px; /* সাইজ কাজ করবে */
  }

  .inline-demo {
    display: inline;
    background-color: green;
    width: 150px; /* সাইজ কাজ করবে না, lekha onujayi nibe*/
  }

  .inline-block-demo {
    display: inline-block;
    background-color: blue;
    width: 50px; /* সাইজ কাজ করবে */
  }

  .none-demo {
    display: none;
    background-color: black;
  }
</style>
</head>
<body>

  <h2>CSS Display Property Demo</h2>

  <div class="block-demo">Block 1</div>
  <div class="block-demo">Block 2</div>

  <hr>

  <div class="inline-demo">Inline 1</div>
  <div class="inline-demo">Inline 2  fdgdf fgdfgdf dfgdfgdf dfgd</div>

  <hr>

  <div class="inline-block-demo">Inline-Block 1</div>
  <div class="inline-block-demo">Inline-Block 2 fgdfbfgh fgdgfgdf bdfghdfhfghb fdgfhdh</div>

  <hr>

  <div class="none-demo">আউটপুটে এই টেক্সটটি দেখাই যাবে না।</div>

</body>
</html>
